<!DOCTYPE html>
<html>

<head>
    <title>AI Prompt App - Options</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="width: 400px;">
    <div class="container">
        <h1>Extension Settings</h1>
        <div class="form-group">
            <label for="appUrl">App URL</label>
            <input type="text" id="appUrl" placeholder="e.g. http://localhost:3000">
        </div>
        <div class="form-group">
            <label for="supaToken">Supabase Access Token</label>
            <input type="password" id="supaToken" placeholder="Paste token here">
        </div>
        <button id="save" class="primary">Save</button>
        <p id="status"></p>
    </div>
    <script src="options.js"></script>
</body>

</html>
